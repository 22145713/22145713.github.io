  <script>
    var Digital = new Date();
    var hours = Digital.getHours();

    if (hours >= 5 && hours <= 11)
      document.write('<b>Good morning, have a good day!</b>');
    else if (hours == 12)
      document.write('<b>It is dinner time, are you hungry?</b>');
    else if (hours >= 13 && hours <= 17)
      document.write('<b>Good afternoon, and thanks for visiting.</b>');
    else if (hours >= 18 && hours <= 20)
      document.write('<b>Good evening, hope you enjoy the beautiful sunset.</b>');
    else if (hours >= 21 || hours <= 4)
      document.write('<b>Thank you for visiting this website, have an amazing night!</b>');
    else
      document.write('<b>Wow! Thanks for choosing to visit our website over sleep!</b>');
  </script>
